version: 2

models:
  - name: fact_order_items
    description: "Central fact table — order line items with denormalized payment and review metrics"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: price
        tests:
          - not_null

  - name: dim_customers
    description: "Customer dimension — city, state, zip"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension — category and physical attributes"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: "Seller dimension — city, state, zip"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Date dimension — generated from order date range"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
